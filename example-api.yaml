apiVersion: apps/v1
kind: Deployment
metadata:
  name: example-api
  namespace: example

spec:
  replicas: 1

  selector:
    matchLabels:
      app: example-api

  template:
    metadata:
      labels:
        app: example-api

    spec:
      containers:
      - name: api
        image: nginx

        ports:
        - containerPort: 80

        volumeMounts:
        - name: nginx-config
          mountPath: /etc/nginx/conf.d

      volumes:
      - name: nginx-config
        configMap:
          name: example-api-config

---
apiVersion: v1
kind: Service
metadata:
  name: example-api-svc
  namespace: example

spec:
  selector:
    app: example-api

  ports:
  - port: 80
    targetPort: 80

  type: ClusterIP